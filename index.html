<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sant Jordi</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #8e44ad, #3498db, #6c3483);
    color: white;
    text-align: center;
}

h1 {
    padding: 20px;
}

.contenedor {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap; /* por si en móvil se bajan */
    padding: 20px;
}

.bloque {
    width: 200px;
    cursor: pointer;
    transition: transform 0.3s;
}

.bloque:hover {
    transform: scale(1.05);
}

.bloque img {
    width: 100%;
    border-radius: 15px;
    border: 3px solid white;
}
</style>
</head>

<body>

<h1>🌹 Sant Jordi</h1>

<div class="contenedor">

    <a href="sant1.html" class="bloque">
        <img src="sant1.png" alt="Sant Jordi 1">
    </a>

    <a href="sant2.html" class="bloque">
        <img src="sant2.png" alt="Sant Jordi 2">
    </a>

    <a href="sant3.html" class="bloque">
        <img src="sant3.png" alt="Sant Jordi 3">
    </a>

    <a href="sant4.html" class="bloque">
        <img src="sant4.png" alt="Sant Jordi 4">
    </a>

</div>

</body>
</html>
